server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WASM MIME type (absent de certaines versions de nginx:alpine)
    types {
        application/wasm          wasm;
        text/html                 html htm;
        text/css                  css;
        application/javascript    js;
        image/svg+xml             svg;
        image/x-icon              ico;
    }

    # SPA : toutes les routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long terme pour les assets hashés (Trunk génère des noms hachés)
    location ~* \.(js|wasm|css|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types
        text/css
        application/javascript
        application/wasm
        image/svg+xml
        application/json;
}
